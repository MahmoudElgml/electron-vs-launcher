<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Solution Launcher - Developed By __weirdzz__</title>
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="cli-style.css">
    <link
      rel="stylesheet"
      href="./node_modules/font-awesome/css/font-awesome.min.css"
    />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
  </head>
  <body class="bg-light">
    <main>
      <div class="container">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-column gap-3">
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary" id="clearBtn">
                  <i class="fa fa-refresh me-1"></i> Reset
                </button>
                <button class="btn btn-primary" id="selectAllBtn">
                  <i class="fa fa-check-square-o me-1"></i> Select All
                </button>
              </div>

              <div class="d-flex flex-wrap gap-2 w-100">
                <button class="btn btn-success" id="launchBtnForCLI">
                  <i class="fa fa-terminal me-1"></i> Run in CLI
                </button>
                
                <button class="btn btn-success" id="launchBtnForIDE">
                  <i class="fa fa-code me-1"></i> Run in IDE
                </button>
                
                <button class="btn btn-success"  id="get-latest-selected">
                  <i class="fa fa-download me-1"></i> Get Latest
                </button>
              </div>
            </div>

            <div id="solutionsContainer" class="mt-4">

            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="./renderer.js"></script>
  <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</html>
