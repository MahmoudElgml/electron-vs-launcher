<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Developed By Mahmoud ELgml</title>
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="cli-style.css">
    <link
      rel="stylesheet"
      href="./node_modules/font-awesome/css/font-awesome.min.css"
    />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
  </head>
  <body>
    <main>
      <div class="container mt-5">
        <!-- <div id="outputBox" class="cli-output my-2">cli output</div> -->
        <div clas="d-flex flex-column gap-2">
          <div class="d-flex  align-items-center gap-2 mb-3">
            <button class="btn btn-sm btn-secondary" id="clearBtn">
              Reset Selections
            </button>
            <button class="btn btn-sm btn-primary" id="selectAllBtn">
              Select All
            </button>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-sm btn-success" id="launchBtnForCLI">
              Run Selected Solutions on CLI
            </button>
            
            <button class="btn btn-sm btn-success" id="launchBtnForIDE">
              Run Selected Solutions on IDE
            </button>
            
            <button class="btn btn-sm btn-success"  id="get-latest-selected">
              Get Latest For Selected
            </button>
          </div>
        </div>

        <div id="solutionsContainer" class="mt-3"></div>

      </div>
    </main>
  </body>
  <script src="./renderer.js"></script>
  <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</html>
